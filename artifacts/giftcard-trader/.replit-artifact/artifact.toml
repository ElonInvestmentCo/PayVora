kind = "mobile"
previewPath = "/"
title = "GiftCard Trader"
version = "1.0.0"
id = "artifacts/giftcard-trader"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22634

[services.development]
run = "pnpm --filter @workspace/giftcard-trader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/giftcard-trader", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/giftcard-trader", "run", "serve" ]

[services.env]
PORT = "22634"
BASE_PATH = "/"
