kind = "mobile"
previewPath = "/"
title = "GiftCard Trader"
version = "1.0.0"
id = "artifacts/giftcard-trader"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/giftcard-trader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/giftcard-trader", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/giftcard-trader", "run", "serve" ]

[services.env]
PORT = "5000"
BASE_PATH = "/"
